name: Commercial Pilot Path Absolute End Lock Execution Check

on:
  push:
    branches: [main]
    paths:
      - "lib/ops/commercial-pilot-path-absolute-end-lock-execution-*.ts"
      - "scripts/ops/run-commercial-pilot-path-absolute-end-lock-execution.ts"
      - "artifacts/commercial-pilot-path-absolute-end-lock-execution-summary.json"
  pull_request:
    paths:
      - "lib/ops/commercial-pilot-path-absolute-end-lock-execution-*.ts"
      - "scripts/ops/run-commercial-pilot-path-absolute-end-lock-execution.ts"
  workflow_dispatch:

jobs:
  commercial-pilot-path-absolute-end-lock-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Assess absolute end lock execution (honest blocked state in CI)
        run: npm run ops -- run-commercial-pilot-path-absolute-end-lock-execution -- --write || true
      - name: Upload execution report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: commercial-pilot-path-absolute-end-lock-execution-report
          path: |
            artifacts/commercial-pilot-path-absolute-end-lock-execution-summary.json
            artifacts/commercial-pilot-path-absolute-end-lock-execution-report.html
          if-no-files-found: warn
