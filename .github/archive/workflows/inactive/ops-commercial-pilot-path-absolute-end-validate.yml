# Commercial pilot path absolute end — workflow_dispatch (Step 15, informational).

name: Commercial Pilot Path Absolute End Validate

on:
  workflow_dispatch:

jobs:
  validate-commercial-pilot-path-absolute-end:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate path absolute end (JSON summary)
        run: npm run ops -- validate-commercial-pilot-path-absolute-end -- --json
      - name: Commercial pilot path absolute end post-steady-state orchestrator (JSON summary)
        run: npm run ops -- run-commercial-pilot-path-absolute-end-post-steady-state-orchestrator -- --json
        continue-on-error: true
