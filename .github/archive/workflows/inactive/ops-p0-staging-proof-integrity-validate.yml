# P0 staging proof integrity — blocks fake PASS in committed artifacts.

name: P0 Staging Proof Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/p0-staging-proof-unblock-summary.json"
      - "artifacts/p0-staging-proof-integrity-baseline.json"
      - "lib/commercial/p0-staging-proof-integrity-era28.ts"
      - "scripts/ops/validate-p0-staging-proof-integrity.ts"

jobs:
  validate-p0-staging-proof-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate P0 staging proof integrity (JSON)
        run: npm run ops -- validate-p0-staging-proof-integrity -- --json
