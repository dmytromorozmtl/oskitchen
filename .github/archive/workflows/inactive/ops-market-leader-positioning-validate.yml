# Market leader positioning env validation — workflow_dispatch (Step 8, post Series A).

name: Market Leader Positioning Validate

on:
  workflow_dispatch:

jobs:
  validate-market-leader-positioning-env:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Market leader positioning env (JSON summary)
        run: npm run ops -- validate-market-leader-positioning-env -- --json
        env:
          SERIES_A_DATA_ROOM_BUNDLE_PUBLISHED: ${{ secrets.SERIES_A_DATA_ROOM_BUNDLE_PUBLISHED }}
          SERIES_A_PARTNER_ONEPAGER_REVIEWED: ${{ secrets.SERIES_A_PARTNER_ONEPAGER_REVIEWED }}
          SERIES_A_CS_PLAYBOOK_REVIEWED: ${{ secrets.SERIES_A_CS_PLAYBOOK_REVIEWED }}
          SCALE_PER_CUSTOMER_GO_ISOLATION: ${{ secrets.SCALE_PER_CUSTOMER_GO_ISOLATION }}
          MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED: ${{ secrets.MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED }}
          MARKET_LEADER_MOAT_DECK_REVIEWED: ${{ secrets.MARKET_LEADER_MOAT_DECK_REVIEWED }}
          MARKET_LEADER_ANALYST_KIT_PUBLISHED: ${{ secrets.MARKET_LEADER_ANALYST_KIT_PUBLISHED }}
          MARKET_LEADER_EXPANSION_MOTION_REVIEWED: ${{ secrets.MARKET_LEADER_EXPANSION_MOTION_REVIEWED }}
      - name: Market leader post-Series A orchestrator (JSON summary)
        run: npm run ops -- run-market-leader-positioning-post-series-a-orchestrator -- --json --skip-template
        continue-on-error: true
        env:
          SERIES_A_DATA_ROOM_BUNDLE_PUBLISHED: ${{ secrets.SERIES_A_DATA_ROOM_BUNDLE_PUBLISHED }}
          SERIES_A_PARTNER_ONEPAGER_REVIEWED: ${{ secrets.SERIES_A_PARTNER_ONEPAGER_REVIEWED }}
          SERIES_A_CS_PLAYBOOK_REVIEWED: ${{ secrets.SERIES_A_CS_PLAYBOOK_REVIEWED }}
          SCALE_PER_CUSTOMER_GO_ISOLATION: ${{ secrets.SCALE_PER_CUSTOMER_GO_ISOLATION }}
          MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED: ${{ secrets.MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED }}
          MARKET_LEADER_MOAT_DECK_REVIEWED: ${{ secrets.MARKET_LEADER_MOAT_DECK_REVIEWED }}
          MARKET_LEADER_ANALYST_KIT_PUBLISHED: ${{ secrets.MARKET_LEADER_ANALYST_KIT_PUBLISHED }}
          MARKET_LEADER_EXPANSION_MOTION_REVIEWED: ${{ secrets.MARKET_LEADER_EXPANSION_MOTION_REVIEWED }}
