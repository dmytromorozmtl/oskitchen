# Sustained product evolution re-entrant integrity — blocks re-entry before honest train closure.

name: Sustained Product Evolution Re-entrant Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/sustained-product-evolution-re-entrant-integrity-baseline.json"
      - "lib/commercial/sustained-product-evolution-re-entrant-integrity-era56.ts"
      - "lib/commercial/sustained-product-evolution-re-entrant-phases-era56.ts"
      - "scripts/ops/validate-sustained-product-evolution-re-entrant-integrity.ts"

jobs:
  validate-sustained-product-evolution-re-entrant-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate sustained product evolution re-entrant integrity (JSON)
        run: npm run ops -- validate-sustained-product-evolution-re-entrant-integrity -- --json
