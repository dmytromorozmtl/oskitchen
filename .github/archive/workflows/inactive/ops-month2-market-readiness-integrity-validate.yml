# Month 2 market readiness integrity — blocks Month 2 without honest Week 1.

name: Month 2 Market Readiness Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/pilot-metrics-baseline-summary.json"
      - "artifacts/investor-narrative-onepager-summary.json"
      - "artifacts/pilot-case-study-draft-summary.json"
      - "artifacts/month2-market-readiness-integrity-baseline.json"
      - "lib/commercial/month2-market-readiness-integrity-era29.ts"
      - "scripts/ops/validate-month2-market-readiness-integrity.ts"

jobs:
  validate-month2-market-readiness-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Month 2 market readiness integrity (JSON)
        run: npm run ops -- validate-month2-market-readiness-integrity -- --json
