# Sustained operational excellence integrity — blocks cadence train without honest Market leader.

name: Sustained Operational Excellence Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/pilot-metrics-baseline-summary.json"
      - "artifacts/competitor-feature-gap-matrix-summary.json"
      - "artifacts/sustained-operational-excellence-integrity-baseline.json"
      - "lib/commercial/sustained-operational-excellence-integrity-era33.ts"
      - "scripts/ops/validate-sustained-operational-excellence-integrity.ts"

jobs:
  validate-sustained-operational-excellence-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Sustained operational excellence integrity (JSON)
        run: npm run ops -- validate-sustained-operational-excellence-integrity -- --json
