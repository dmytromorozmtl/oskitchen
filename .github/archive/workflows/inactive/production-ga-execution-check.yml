name: Production GA Execution Check

on:
  push:
    branches: [main]
    paths:
      - "lib/ops/production-ga-execution-*.ts"
      - "scripts/ops/run-production-ga-execution.ts"
      - "artifacts/production-ga-execution-summary.json"
  pull_request:
    paths:
      - "lib/ops/production-ga-execution-*.ts"
      - "scripts/ops/run-production-ga-execution.ts"
  workflow_dispatch:

jobs:
  production-ga-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Assess production GA execution (honest blocked state in CI)
        run: npm run ops -- run-production-ga-execution -- --write || true
      - name: Upload execution report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-ga-execution-report
          path: |
            artifacts/production-ga-execution-summary.json
            artifacts/production-ga-execution-report.html
          if-no-files-found: warn
