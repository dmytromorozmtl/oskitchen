# Era25 Band A governance chain capstone witness integrity — blocks witness before honest commercial ops permanence.

name: Era25 Band A Governance Chain Capstone Witness Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/era25-band-a-governance-chain-capstone-witness-integrity-baseline.json"
      - "lib/commercial/era25-band-a-governance-chain-capstone-witness-integrity-era66.ts"
      - "lib/commercial/era25-band-a-governance-chain-capstone-witness-phases-era66.ts"
      - "scripts/ops/validate-era25-band-a-governance-chain-capstone-witness-integrity.ts"

jobs:
  validate-era25-band-a-governance-chain-capstone-witness-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 Band A governance chain capstone witness integrity (JSON)
        run: npm run ops -- validate-era25-band-a-governance-chain-capstone-witness-integrity -- --json
