name: Maintenance Mode Execution Check

on:
  push:
    branches: [main]
    paths:
      - "lib/ops/maintenance-mode-execution-*.ts"
      - "scripts/ops/run-maintenance-mode-execution.ts"
      - "artifacts/maintenance-mode-execution-summary.json"
  pull_request:
    paths:
      - "lib/ops/maintenance-mode-execution-*.ts"
      - "scripts/ops/run-maintenance-mode-execution.ts"
  workflow_dispatch:

jobs:
  maintenance-mode-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Assess maintenance mode execution (honest blocked state in CI)
        run: npm run ops -- run-maintenance-mode-execution -- --write || true
      - name: Upload execution report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-mode-execution-report
          path: |
            artifacts/maintenance-mode-execution-summary.json
            artifacts/maintenance-mode-execution-report.html
          if-no-files-found: warn
