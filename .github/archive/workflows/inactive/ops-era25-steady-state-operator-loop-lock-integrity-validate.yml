# Era25 steady-state operator loop convergence lock integrity — blocks lock before honest charter lock.

name: Era25 Steady-state Operator Loop Lock Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/era25-steady-state-operator-loop-lock-integrity-baseline.json"
      - "lib/commercial/era25-steady-state-operator-loop-lock-integrity-era58.ts"
      - "lib/commercial/era25-steady-state-operator-loop-lock-phases-era58.ts"
      - "scripts/ops/validate-era25-steady-state-operator-loop-lock-integrity.ts"

jobs:
  validate-era25-steady-state-operator-loop-lock-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 steady-state operator loop lock integrity (JSON)
        run: npm run ops -- validate-era25-steady-state-operator-loop-lock-integrity -- --json
