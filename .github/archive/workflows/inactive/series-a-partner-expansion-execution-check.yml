name: Series A Partner Expansion Execution Check

on:
  push:
    branches: [main]
    paths:
      - "lib/ops/series-a-partner-expansion-execution-*.ts"
      - "scripts/ops/run-series-a-partner-expansion-execution.ts"
      - "artifacts/series-a-partner-expansion-execution-summary.json"
  pull_request:
    paths:
      - "lib/ops/series-a-partner-expansion-execution-*.ts"
      - "scripts/ops/run-series-a-partner-expansion-execution.ts"
  workflow_dispatch:

jobs:
  series-a-partner-expansion-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Assess Series A partner expansion execution (honest blocked state in CI)
        run: npm run ops -- run-series-a-partner-expansion-execution -- --write || true
      - name: Upload execution report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: series-a-partner-expansion-execution-report
          path: |
            artifacts/series-a-partner-expansion-execution-summary.json
            artifacts/series-a-partner-expansion-execution-report.html
          if-no-files-found: warn
