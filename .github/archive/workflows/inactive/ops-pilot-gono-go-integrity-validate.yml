# Pilot GO/NO-GO integrity — blocks fake GO in committed artifacts.

name: Pilot GO NO-GO Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/pilot-gono-go-summary.json"
      - "artifacts/pilot-gono-go-integrity-baseline.json"
      - "lib/commercial/pilot-gono-go-integrity-era28.ts"
      - "scripts/ops/validate-pilot-gono-go-integrity.ts"

jobs:
  validate-pilot-gono-go-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate pilot GO/NO-GO integrity (JSON)
        run: npm run ops -- validate-pilot-gono-go-integrity -- --json
