name: Storefront — forms file upload (Week 4)
description: Sprint for dynamic form file attachments on public storefront
title: "[Storefront] Forms file-upload E2E"
labels: ["storefront", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Not blocking storefront launch.** Track after Week 3 slider QA sign-off.
        Reference: `docs/artifacts/STOREFRONT_WEEKS_2_4_BACKLOG.md` § Week 4
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: Add `file` field type to `STOREFRONT_FORM_FIELD_TYPES`
        - label: Public `<input type="file">` in `storefront-form-renderer.tsx`
        - label: Server handler in `storefront-form-submission-service.ts` (size/MIME limits)
        - label: Storage via `storefront-media` or `storefront-uploads` bucket
        - label: Turnstile on dynamic form POST (parity with contact)
        - label: E2E test with fixture upload
        - label: Virus scan / async scan hook (if required by security)
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - Merchant can add optional file field to a form in builder
        - Guest can upload PDF/image ≤ configured max (e.g. 5MB)
        - Submission row stores storage path; admin can download
        - Rate limit + Turnstile enforced
        - No regression on existing contact honeypot flow
  - type: input
    id: pilot_slug
    attributes:
      label: Pilot slug
      value: hello
