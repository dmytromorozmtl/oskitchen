# Weekly dependency updates — does not auto-merge; CI must stay green.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 8
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
