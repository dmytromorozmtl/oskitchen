# Market leader positioning convergence era25 integrity — blocks market leader attestation without honest Series A.

name: Market Leader Positioning Convergence Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/market-leader-positioning-convergence-integrity-baseline.json"
      - "artifacts/market-leader-positioning-convergence-era25-report.md"
      - "lib/commercial/market-leader-positioning-convergence-integrity-era52.ts"
      - "scripts/ops/validate-market-leader-positioning-convergence-integrity.ts"

jobs:
  validate-market-leader-positioning-convergence-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate market leader positioning convergence integrity (JSON)
        run: npm run ops -- validate-market-leader-positioning-convergence-integrity -- --json
