# Commercial GO closure env validation — workflow_dispatch (Step 3, post-Tier 2).

name: Commercial GO Closure Validate

on:
  workflow_dispatch:

jobs:
  validate-commercial-go-closure-env:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate commercial GO closure env (JSON summary)
        run: npm run ops -- validate-commercial-go-closure-env -- --json
        env:
          PILOT_GONOGO_ICP_INPUT_JSON: ${{ secrets.PILOT_GONOGO_ICP_INPUT_JSON }}
          PILOT_GONOGO_CUSTOMER_NAME: ${{ secrets.PILOT_GONOGO_CUSTOMER_NAME }}
          PILOT_GONOGO_LOI_SIGNED_DATE: ${{ secrets.PILOT_GONOGO_LOI_SIGNED_DATE }}
          PILOT_GONOGO_ROLE_CHECKLISTS_COMPLETE: ${{ secrets.PILOT_GONOGO_ROLE_CHECKLISTS_COMPLETE }}
          PILOT_GONOGO_FORBIDDEN_CLAIMS_IN_CONTRACT: ${{ secrets.PILOT_GONOGO_FORBIDDEN_CLAIMS_IN_CONTRACT }}
      - name: Commercial GO post-Tier2 orchestrator (JSON summary)
        run: npm run ops -- run-commercial-go-closure-post-tier2-orchestrator -- --json --skip-template
        continue-on-error: true
        env:
          PILOT_GONOGO_ICP_INPUT_JSON: ${{ secrets.PILOT_GONOGO_ICP_INPUT_JSON }}
          PILOT_GONOGO_CUSTOMER_NAME: ${{ secrets.PILOT_GONOGO_CUSTOMER_NAME }}
          PILOT_GONOGO_LOI_SIGNED_DATE: ${{ secrets.PILOT_GONOGO_LOI_SIGNED_DATE }}
          PILOT_GONOGO_ROLE_CHECKLISTS_COMPLETE: ${{ secrets.PILOT_GONOGO_ROLE_CHECKLISTS_COMPLETE }}
          PILOT_GONOGO_FORBIDDEN_CLAIMS_IN_CONTRACT: ${{ secrets.PILOT_GONOGO_FORBIDDEN_CLAIMS_IN_CONTRACT }}
