# Manual Playwright smoke against a **running** deployment (preview / staging / prod smoke).
# Does not start Next.js or Postgres in CI — you supply the base URL at run time.
#
# Setup:
# 1. Run workflow from Actions → "E2E remote smoke" → Run workflow → enter `target_url`.
# 2. Optional dashboard tests: set repo variable PLAYWRIGHT_INCLUDE_DASHBOARD=true and add secrets
#    E2E_LOGIN_EMAIL / E2E_LOGIN_PASSWORD (same semantics as local Playwright; see docs/TESTING.md).
# 3. Optional DB seed before dashboard: set PLAYWRIGHT_RUN_E2E_DB_SEED=true and secrets E2E_DATABASE_URL,
#    E2E_DIRECT_URL (session pooler), E2E_SEED_USER_ID — runs migrate deploy + npm run db:seed:e2e-pos (staging only).
# 4. Optional storefront: PLAYWRIGHT_INCLUDE_STOREFRONT=true and secret E2E_STOREFRONT_SLUG (published slug on target host).
# 5. Optional prune after dashboard: PLAYWRIGHT_PRUNE_AFTER_E2E=true — runs npm run db:prune:e2e-pos-orders --execute
#    (needs secrets E2E_DATABASE_URL + E2E_SEED_USER_ID; staging only).
# 6. On GitHub Actions (CI=true), Playwright writes HTML + junit under playwright-report/ and test-results/ — uploaded as artifacts.
# 7. JUnit is published to GitHub Checks (dorny/test-reporter) when those files exist — needs workflow permission checks: write.

name: E2E remote smoke

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Base URL of a running OS Kitchen host (https://…, no trailing slash)"
        required: true
        type: string

permissions:
  contents: read
  checks: write

concurrency:
  group: e2e-remote-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  public-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Public smoke + help
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.target_url }}
          CI: true
        run: npx playwright test e2e/smoke.spec.ts e2e/help-order-hub.spec.ts

      - name: Upload Playwright report (public)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-remote-public-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

      - name: Publish JUnit to Checks (public)
        if: ${{ always() }}
        continue-on-error: true
        uses: dorny/test-reporter@v2
        with:
          name: E2E remote · public
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

  storefront-smoke:
    needs: public-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: vars.PLAYWRIGHT_INCLUDE_STOREFRONT == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Storefront smoke (slug from secret)
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.target_url }}
          E2E_STOREFRONT_SLUG: ${{ secrets.E2E_STOREFRONT_SLUG }}
          CI: true
        run: npx playwright test e2e/storefront.spec.ts

      - name: Upload Playwright report (storefront)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-remote-storefront-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

      - name: Publish JUnit to Checks (storefront)
        if: ${{ always() }}
        continue-on-error: true
        uses: dorny/test-reporter@v2
        with:
          name: E2E remote · storefront
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

  dashboard-smoke:
    needs: public-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: vars.PLAYWRIGHT_INCLUDE_DASHBOARD == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Optional — migrate + POS E2E DB fixture (staging DB only)
        if: ${{ vars.PLAYWRIGHT_RUN_E2E_DB_SEED == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.E2E_DIRECT_URL }}
          E2E_SEED_USER_ID: ${{ secrets.E2E_SEED_USER_ID }}
        run: |
          npx prisma migrate deploy
          npm run db:seed:e2e-pos

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Auth setup + dashboard specs
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.target_url }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          CI: true
        run: |
          npx playwright test e2e/auth.setup.ts \
            e2e/dashboard-auth.spec.ts \
            e2e/workspace-post-not-null-smoke.spec.ts \
            e2e/pos-checkout-flow.spec.ts

      - name: Upload Playwright report (dashboard)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-remote-dashboard-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

      - name: Publish JUnit to Checks (dashboard)
        if: ${{ always() }}
        continue-on-error: true
        uses: dorny/test-reporter@v2
        with:
          name: E2E remote · dashboard
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Optional — prune E2E POS orders (staging DB)
        if: ${{ vars.PLAYWRIGHT_PRUNE_AFTER_E2E == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          E2E_SEED_USER_ID: ${{ secrets.E2E_SEED_USER_ID }}
        run: npm run db:prune:e2e-pos-orders -- --execute --max-age-hours=168
