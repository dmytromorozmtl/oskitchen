# Paid pilot GO convergence era25 integrity — blocks convergence attestation without honest breakthrough.

name: Paid Pilot GO Convergence Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/paid-pilot-go-convergence-integrity-baseline.json"
      - "artifacts/paid-pilot-go-convergence-era25-report.md"
      - "lib/commercial/paid-pilot-go-convergence-integrity-era47.ts"
      - "scripts/ops/validate-paid-pilot-go-convergence-integrity.ts"

jobs:
  validate-paid-pilot-go-convergence-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate paid pilot GO convergence integrity (JSON)
        run: npm run ops:validate-paid-pilot-go-convergence-integrity -- --json
