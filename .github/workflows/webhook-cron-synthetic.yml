# Scheduled synthetic probe for webhook job cron (HTTP dry run — no queue drain).
# Mirrors scripts/check-webhook-cron-smoke.sh against production (or staging) host.
#
# Enable for a repository:
# 1. Add secrets: WEBHOOK_CRON_SYNTHETIC_APP_URL (https://…, no trailing slash), WEBHOOK_CRON_SYNTHETIC_CRON_SECRET (same as CRON_SECRET on the host).
# 2. Add variable: WEBHOOK_CRON_SYNTHETIC_SCHEDULE_ENABLED = true (otherwise scheduled runs are skipped).
#
# Manual run: Actions → "Webhook cron synthetic" → Run workflow (no variable required; secrets must be set).

name: Webhook cron synthetic

on:
  schedule:
    - cron: "25 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webhook-cron-synthetic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' || vars.WEBHOOK_CRON_SYNTHETIC_SCHEDULE_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: GET /api/cron/webhook-jobs?dryRun=1
        env:
          APP_URL: ${{ secrets.WEBHOOK_CRON_SYNTHETIC_APP_URL }}
          CRON_SECRET: ${{ secrets.WEBHOOK_CRON_SYNTHETIC_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${APP_URL:-}" || -z "${CRON_SECRET:-}" ]]; then
            echo "::error::Configure secrets WEBHOOK_CRON_SYNTHETIC_APP_URL and WEBHOOK_CRON_SYNTHETIC_CRON_SECRET (see workflow header comments)."
            exit 1
          fi
          bash scripts/check-webhook-cron-smoke.sh
