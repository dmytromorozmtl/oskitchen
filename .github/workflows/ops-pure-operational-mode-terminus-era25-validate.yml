name: era25 Pure Operational Mode Terminus Validate

on:
  workflow_dispatch:

jobs:
  validate-pure-operational-mode-terminus-era25:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 pure operational mode terminus (JSON summary)
        run: npm run ops:validate-pure-operational-mode-terminus-era25 -- --json
      - name: era25 terminus post-sustained-ops-convergence orchestrator (JSON summary)
        run: npm run ops:run-pure-operational-mode-terminus-post-sustained-ops-convergence-orchestrator-era25 -- --json
        continue-on-error: true
