# Commercial pilot path validation — workflow_dispatch (Step 13 master orchestration).

name: Commercial Pilot Path Validate

on:
  workflow_dispatch:

jobs:
  validate-commercial-pilot-path:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate commercial pilot path (JSON summary)
        run: npm run ops:validate-commercial-pilot-path -- --json
        env:
          E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          WOO_CONSUMER_KEY: ${{ secrets.WOO_CONSUMER_KEY }}
          WOO_CONSUMER_SECRET: ${{ secrets.WOO_CONSUMER_SECRET }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SCALE_PER_CUSTOMER_GO_ISOLATION: ${{ secrets.SCALE_PER_CUSTOMER_GO_ISOLATION }}
          SERIES_A_MARKETING_CLAIMS_STRICT_REVIEWED: ${{ secrets.SERIES_A_MARKETING_CLAIMS_STRICT_REVIEWED }}
          MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED: ${{ secrets.MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED }}
          MARKET_LEADER_MOAT_DECK_REVIEWED: ${{ secrets.MARKET_LEADER_MOAT_DECK_REVIEWED }}
          MARKET_LEADER_ANALYST_KIT_PUBLISHED: ${{ secrets.MARKET_LEADER_ANALYST_KIT_PUBLISHED }}
          MARKET_LEADER_EXPANSION_MOTION_REVIEWED: ${{ secrets.MARKET_LEADER_EXPANSION_MOTION_REVIEWED }}
          SUSTAINED_OPS_DAILY_CADENCE_ATTESTED: ${{ secrets.SUSTAINED_OPS_DAILY_CADENCE_ATTESTED }}
          SUSTAINED_OPS_WEEKLY_INTEGRATION_REVIEWED: ${{ secrets.SUSTAINED_OPS_WEEKLY_INTEGRATION_REVIEWED }}
          SUSTAINED_OPS_MONTHLY_METRICS_REFRESHED: ${{ secrets.SUSTAINED_OPS_MONTHLY_METRICS_REFRESHED }}
          SUSTAINED_OPS_QUARTERLY_GOVERNANCE_AUDITED: ${{ secrets.SUSTAINED_OPS_QUARTERLY_GOVERNANCE_AUDITED }}
      - name: Engineering path terminus post-maintenance-mode orchestrator (JSON summary)
        run: npm run ops:run-engineering-path-terminus-post-maintenance-mode-orchestrator -- --json
        continue-on-error: true
        env:
          E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          WOO_CONSUMER_KEY: ${{ secrets.WOO_CONSUMER_KEY }}
          WOO_CONSUMER_SECRET: ${{ secrets.WOO_CONSUMER_SECRET }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SCALE_PER_CUSTOMER_GO_ISOLATION: ${{ secrets.SCALE_PER_CUSTOMER_GO_ISOLATION }}
          SERIES_A_MARKETING_CLAIMS_STRICT_REVIEWED: ${{ secrets.SERIES_A_MARKETING_CLAIMS_STRICT_REVIEWED }}
          MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED: ${{ secrets.MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED }}
          MARKET_LEADER_MOAT_DECK_REVIEWED: ${{ secrets.MARKET_LEADER_MOAT_DECK_REVIEWED }}
          MARKET_LEADER_ANALYST_KIT_PUBLISHED: ${{ secrets.MARKET_LEADER_ANALYST_KIT_PUBLISHED }}
          MARKET_LEADER_EXPANSION_MOTION_REVIEWED: ${{ secrets.MARKET_LEADER_EXPANSION_MOTION_REVIEWED }}
          SUSTAINED_OPS_DAILY_CADENCE_ATTESTED: ${{ secrets.SUSTAINED_OPS_DAILY_CADENCE_ATTESTED }}
          SUSTAINED_OPS_WEEKLY_INTEGRATION_REVIEWED: ${{ secrets.SUSTAINED_OPS_WEEKLY_INTEGRATION_REVIEWED }}
          SUSTAINED_OPS_MONTHLY_METRICS_REFRESHED: ${{ secrets.SUSTAINED_OPS_MONTHLY_METRICS_REFRESHED }}
          SUSTAINED_OPS_QUARTERLY_GOVERNANCE_AUDITED: ${{ secrets.SUSTAINED_OPS_QUARTERLY_GOVERNANCE_AUDITED }}
