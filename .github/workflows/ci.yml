name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (high severity gate)
        run: npm run audit -- dependencies:high

      - name: Prisma generate
        run: npx prisma generate

      - name: Validate workflow script references
        run: npm run validate -- ci-workflow-scripts

      - name: Verify install chain
        run: npm run verify -- install-chain

      - name: Verify storefront migration artifacts
        run: npm run verify -- storefront-migration

      - name: Verify storefront action imports
        run: npm run verify -- storefront-actions

      - name: Typecheck
        run: npm run typecheck

      - name: Prisma validate
        run: npx prisma validate

      - name: Validate production cron manifest
        run: npm run validate -- production-crons

      - name: Validate cron route inventory
        run: npm run validate -- cron-inventory

      - name: Validate API route registry
        run: npm run validate -- api-route-registry

      - name: Audit API route classification
        run: npm run audit -- api-routes

      - name: Validate tenant scope (pilot paths)
        run: npm run validate -- tenant-scope-pilot

      - name: Validate dashboard owner scope
        run: npm run validate -- dashboard-owner-scope

      - name: Workspace migration audit gate
        run: npm run workspace -- audit:gate

      - name: WorkspaceId schema coverage
        run: npm run workspace -- coverage:check

      - name: Service userId scope audit (strict)
        run: npm run workspace -- audit:services:strict

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: POS RBAC focused tests
        run: npm run test:pos-rbac

      - name: Governance and public API focused bundles
        run: npm run test:ci -- governance-bundles

      - name: Era 3 RBAC wave 3 focused bundle
        run: npm run test:ci -- rbac-wave3

      - name: Public POST fail-closed bundle
        run: npm run test:ci -- public-post-fail-closed

      - name: Unit test coverage (threshold gate)
        run: npm run test:coverage

      - name: Storefront payment matrix
        run: node ./node_modules/vitest/vitest.mjs run tests/unit/storefront-stripe-matrix.test.ts tests/unit/storefront-i18n-structure.test.ts

      - name: Demo scenario plans (static)
        run: npm run check-demo-scenarios

      - name: Forbidden claims CI gate (blocks merge on banned phrases)
        run: npm run gate:forbidden-claims

      - name: Forbidden claims enforcement auto-test
        run: npm run test:ci -- forbidden-claims-enforcement

      - name: Authed RSC probe policy (P0-12 — 46 dashboard routes)
        run: npm run check:authed-rsc-probe-p0-12

      - name: WooCommerce webhook→KDS E2E policy (P0-13)
        run: npm run check:woocommerce-webhook-kds-e2e-p0-13

      - name: Shopify webhook→KDS E2E policy (P0-14)
        run: npm run check:shopify-webhook-kds-e2e-p0-14

      - name: Cross-tenant data leak E2E policy (P0-15)
        run: npm run check:cross-tenant-data-leak-e2e-p0-15

      - name: Deploy skip vitest removed (P1-16)
        run: npm run check:deploy-skip-vitest-p1-16

      - name: API mutation rate limit coverage (P1-17)
        run: npm run check:api-mutation-rate-limit-p1-17

      - name: Par levels auto-reorder N+1 batch fix (P1-18)
        run: npm run check:par-levels-auto-reorder-p1-18

      - name: Remaining N+1 batch fixes (P1-19)
        run: npm run check:n-plus-one-p1-19

      - name: Production cron heartbeat monitoring (P1-20)
        run: npm run check:cron-heartbeat-monitoring-p1-20

      - name: Rate limit regression — mutation routes (P1-21)
        run: npm run check:rate-limit-regression-p1-21

      - name: Integration Health Center hero section (P1-22)
        run: npm run check:integration-health-center-hero-p1-22

      - name: Honest competitor comparison pages (P1-23)
        run: npm run check:honest-competitor-comparison-p1-23

      - name: ICP landing pages — meal prep + ghost kitchen (P1-24)
        run: npm run check:icp-landing-pages-p1-24

      - name: Remove hardware roadmap from marketing (P1-25)
        run: npm run check:remove-hardware-roadmap-p1-25

      - name: SOC 2 messaging — in progress not certified (P1-26)
        run: npm run check:soc2-messaging-p1-26

      - name: Trust page security details (P1-27)
        run: npm run check:trust-page-security-p1-27

      - name: Demo interactive sandbox — test credentials + LIVE integrations (P1-28)
        run: npm run check:demo-interactive-sandbox-p1-28

      - name: Invoice AI photo-first capture (P1-29)
        run: npm run check:invoice-ai-photo-first-p1-29

      - name: Self-serve onboarding — registration → integrations → first order (P1-30)
        run: npm run check:self-serve-onboarding-p1-30

      - name: Offline POS full mode — Toast parity + noop-v1 review (P1-31)
        run: npm run check:offline-pos-full-mode-p1-31

      - name: Shopify real-time inventory sync proof (P1-32)
        run: npm run check:shopify-realtime-inventory-sync-proof-p1-32

      - name: Segment-level not-found.tsx — dashboard, vendor, storefront (P1-33)
        run: npm run check:segment-level-not-found-p1-33

      - name: AI messaging — AI-assisted not AI-powered (P1-34)
        run: npm run check:ai-messaging-p1-34

      - name: Offline POS PCI flow E2E — offline→AES-GCM→sync (P1-35)
        run: npm run check:offline-pos-pci-flow-p1-35

      - name: Loyalty earn→redeem E2E — order→CRM→next order (P1-36)
        run: npm run check:loyalty-earn-redeem-e2e-p1-36

      - name: QR scan→storefront→KDS E2E — webhook→KitchenTask (P1-37)
        run: npm run check:qr-scan-storefront-kds-e2e-p1-37

      - name: AI invoice scanner accuracy — 100 invoices field-level (P1-38)
        run: npm run check:invoice-scanner-accuracy-p1-38

      - name: SCIM provision UI E2E — IdP→group→deprovision (P1-39)
        run: npm run check:scim-provision-ui-e2e-p1-39

      - name: Sentry alert firing — error→Sentry→alert <5min (P1-40)
        run: npm run check:sentry-alert-firing-p1-40

      - name: Suspense boundaries — wave 1 Today/Marketplace/POS/Kitchen (P2-41)
        run: npm run check:suspense-boundaries-p2-41

      - name: Dashboard error.tsx — 45 operator routes templated (P2-42)
        run: npm run check:dashboard-error-tsx-p2-42

      - name: Public pages error.tsx — 251 pages layout catch-all (P2-43)
        run: npm run check:public-pages-error-tsx-p2-43

      - name: Offline POS PCI noop-v1 — QSA retain-empty-only review (P2-44)
        run: npm run check:offline-pos-pci-noop-v1-p2-44

      - name: Blueprint registry — Sentry production sync (P2-45)
        run: npm run check:blueprint-registry-p2-45

      - name: npm audit gate — high severity dependency check (P2-46)
        run: npm run check:npm-audit-gate-p2-46

      - name: Product thumbnail alt text — alt={productName} (P2-47)
        run: npm run check:product-thumbnail-alt-text-p2-47

      - name: staticGenerationMaxConcurrency — Vercel=1 review (P2-48)
        run: npm run check:static-generation-max-concurrency-p2-48

      - name: Prisma config — prisma.config.ts migration (P2-49)
        run: npm run check:prisma-config-p2-49

      - name: POS shift open→close E2E — refund void reconcile (P2-50)
        run: npm run check:pos-shift-open-close-p2-50

      - name: Enterprise SSO SAML E2E — Okta redirect assertion dashboard (P2-51)
        run: npm run check:enterprise-sso-saml-e2e-p2-51

      - name: Preview route redirect regression — deep link preserved (P2-52)
        run: npm run check:preview-route-redirect-regression-p2-52

      - name: Maintenance mode panel perf budget — Lighthouse thresholds (P2-53)
        run: npm run check:maintenance-mode-panel-perf-budget-p2-53

      - name: Commission comparison calculator — DoorDash/Uber interactive (P2-54)
        run: npm run check:commission-comparison-calculator-p2-54

      - name: SEO blog articles — 5 posts meal prep ghost kitchen POS (P2-55)
        run: npm run check:seo-blog-articles-p2-55

      - name: Case study template pipeline — LOI to day-30 publish (P2-56)
        run: npm run check:case-study-template-pipeline-p2-56

      - name: Works with OS Kitchen — 17 LIVE integrations with logos (P2-57)
        run: npm run check:works-with-os-kitchen-p2-57

      - name: Design partner email sequence — 5-step founder outreach (P2-58)
        run: npm run check:design-partner-email-sequence-p2-58

      - name: LinkedIn content plan — 3 posts/week founder-led (P2-59)
        run: npm run check:linkedin-content-plan-p2-59

      - name: Product Hunt launch prep — assets, copy, checklist (P2-60)
        run: npm run check:product-hunt-launch-prep-p2-60

      - name: AI briefing accuracy benchmarks — Toast IQ parity (P2-61)
        run: npm run check:ai-briefing-accuracy-benchmark-p2-61

      - name: Loyalty earn/redeem LIVE — POS + storefront Square parity (P2-62)
        run: npm run check:loyalty-earn-redeem-p2-62

      - name: Inventory AI photo count — MarketMan parity (P2-63)
        run: npm run check:inventory-ai-photo-count-p2-63

      - name: Catering BEO format — Tripleseat parity (P2-64)
        run: npm run check:catering-beo-format-p2-64

      - name: Floor plan editor — Lightspeed parity (P2-65)
        run: npm run check:floor-plan-editor-p2-65

      - name: Labor forecasting AI — 7shifts parity (P2-66)
        run: npm run check:labor-forecasting-ai-p2-66

      - name: Vendor price change alerts — MarginEdge parity (P2-67)
        run: npm run check:vendor-price-change-alerts-p2-67

      - name: Photo invoice AI — Poster POS parity (P2-68)
        run: npm run check:photo-invoice-ai-p2-68

      - name: AI co-pilot accuracy benchmarks (P2-69)
        run: npm run check:copilot-accuracy-benchmark-p2-69

      - name: Gift cards issue/redeem regression (P2-70)
        run: npm run check:gift-cards-regression-p2-70

      - name: Co-pilot hallucination regression (P2-71)
        run: npm run check:copilot-hallucination-regression-p2-71

      - name: SCIM enterprise self-serve UI (P2-72)
        run: npm run check:scim-enterprise-self-serve-p2-72

      - name: Loyalty program earn/redeem LIVE (P2-73)
        run: npm run check:loyalty-program-live-p2-73

      - name: QR ordering E2E — scan to KDS (P2-74)
        run: npm run check:qr-ordering-e2e-p2-74

      - name: Developer API rate limits + docs (P2-75)
        run: npm run check:developer-api-rate-limits-p2-75

      - name: Archive era npm scripts (P3-76)
        run: npm run check:archive-era-scripts-p3-76

      - name: Archive GitHub workflows (P3-77)
        run: npm run check:archive-workflows-p3-77

      - name: Build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee artifacts/build-route-sizes.log
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kitchenos_ci
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kitchenos_ci

      - name: Performance regression (bundle size)
        run: npm run test:ci -- bundle-size-regression

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Platform access E2E
        run: |
          npm run start -- -p 3000 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3000/login >/dev/null && break
            sleep 2
          done
          npx playwright test tests/e2e/platform-access-denial.spec.ts tests/e2e/a11y-marketing.spec.ts tests/e2e/a11y-auth-shell.spec.ts --project=chromium
        env:
          CI: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}

      # Optional Playwright against a **deployed** host: use workflow `.github/workflows/e2e-remote-smoke.yml`
      # (workflow_dispatch + target URL). Optional dashboard job: repo variable PLAYWRIGHT_INCLUDE_DASHBOARD=true
      # and secrets E2E_LOGIN_EMAIL / E2E_LOGIN_PASSWORD — see docs/TESTING.md.

      # Optional Playwright storefront smoke: requires a running app + published slug (see docs/STOREFRONT_E2E_SMOKE_TESTS.md).
      # - name: Install Playwright Chromium
      #   run: npx playwright install chromium --with-deps
      # - name: Storefront E2E
      #   run: npm run test:e2e:storefront
      #   env:
      #     PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"
      #     E2E_STOREFRONT_SLUG: ${{ vars.E2E_STOREFRONT_SLUG }}

      # Optional: DB-backed demo audit when a workspace id and database URL are configured.
      # - name: Demo scenario DB audit
      #   run: npm run check-demo-scenarios:db
      #   env:
      #     DATABASE_URL: ${{ secrets.DEMO_CI_DATABASE_URL }}
      #     DEMO_AUDIT_WORKSPACE_ID: ${{ secrets.DEMO_AUDIT_WORKSPACE_ID }}
      #     DEMO_DB_AUDIT_ALLOW_PRODUCTION: "true"

  # Era 6 — optional parallel strict slices at 6GB heap (canonical gate remains quality → typecheck:full).
  typecheck-slices:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck strict slices (parallel memory path)
        run: npm run typecheck:ci:slices

  # Era 9 — optional parallel governance partitions (canonical gate remains quality → test:ci:governance-bundles).
  governance-bundles-partitions:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        partition: [platform, money-path, security-rbac, product-kds]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Governance bundle partition (${{ matrix.partition }})
        run: npm run test:ci -- governance-bundles:partition-${{ matrix.partition }}

  security-db:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kitchenos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kitchenos_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kitchenos_ci
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/kitchenos_ci
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      RUN_DB_INTEGRATION: "1"
      CRON_SECRET: ci-db-cron-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply schema to CI database
        run: node ./node_modules/prisma/build/index.js db push --skip-generate

      - name: Security and tenant isolation tests
        run: npm run test:security

  storefront-money-path:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kitchenos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kitchenos_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kitchenos_ci
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/kitchenos_ci
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      ENCRYPTION_KEY: ERERERERERERERERERERERERERERERERERERERERERE=
      CI_STOREFRONT_SLUG: hello
      E2E_STOREFRONT_SLUG: hello
      E2E_STORE_SLUG: hello
      TURNSTILE_SECRET_KEY: ""
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      CI: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply schema to CI database
        run: node ./node_modules/prisma/build/index.js db push --skip-generate

      - name: Seed CI storefront checkout fixture
        run: npm run storefront -- seed-ci-checkout

      - name: Storefront money-path unit tests
        run: npm run test:ci -- storefront-money-path:unit

      - name: Build application
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Storefront pay-later checkout E2E
        run: |
          npm run start -- -p 3000 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3000/api/health >/dev/null && break
            sleep 2
          done
          npm run test:ci -- storefront-money-path:e2e

      - name: Storefront Stripe live-card E2E (optional — STRIPE_SECRET_KEY required)
        id: storefront_stripe_e2e
        if: ${{ secrets.STRIPE_SECRET_KEY != '' }}
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STOREFRONT_E2E_STRIPE: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npm run test:ci -- storefront-money-path:stripe-e2e

      - name: Storefront Stripe E2E CI policy summary
        if: always()
        env:
          STOREFRONT_STRIPE_E2E_STEP_OUTCOME: ${{ steps.storefront_stripe_e2e.outcome }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STOREFRONT_E2E_STRIPE: ${{ secrets.STRIPE_SECRET_KEY != '' && '1' || '' }}
        run: npm run test:ci -- storefront-stripe-e2e:policy

      - name: Upload storefront Stripe E2E summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storefront-stripe-e2e-summary
          path: ci-artifacts/storefront-stripe-e2e-summary.json
          if-no-files-found: warn

  pos-money-path:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kitchenos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kitchenos_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kitchenos_ci
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/kitchenos_ci
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      ENCRYPTION_KEY: ERERERERERERERERERERERERERERERERERERERERERE=
      RUN_DB_INTEGRATION: "1"
      CI: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply schema to CI database
        run: node ./node_modules/prisma/build/index.js db push --skip-generate

      - name: Seed CI POS checkout fixture
        run: npm run pos:seed-ci-checkout

      - name: POS money-path unit tests
        run: npm run test:ci -- pos-money-path:unit

      - name: POS checkout integration (cash sale + PII)
        run: npm run test:ci -- pos-money-path:integration

      - name: POS inventory depletion integration
        run: npm run test:ci -- pos-money-path:inventory

      - name: Build application
        if: ${{ secrets.E2E_LOGIN_EMAIL != '' && secrets.E2E_LOGIN_PASSWORD != '' }}
        run: npm run build

      - name: Install Playwright Chromium
        if: ${{ secrets.E2E_LOGIN_EMAIL != '' && secrets.E2E_LOGIN_PASSWORD != '' }}
        run: npx playwright install chromium --with-deps

      - name: POS browser E2E (tier 2b — dashboard auth secrets required)
        id: pos_browser_e2e
        if: ${{ secrets.E2E_LOGIN_EMAIL != '' && secrets.E2E_LOGIN_PASSWORD != '' }}
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          E2E_SEED_USER_ID: ${{ secrets.E2E_CI_POS_USER_ID }}
          SEED_USER_ID: ${{ secrets.E2E_CI_POS_USER_ID }}
        run: |
          if [ -n "${E2E_SEED_USER_ID:-}" ]; then
            npx tsx scripts/seed-e2e-pos-fixture.ts
          fi
          npm run start -- -p 3000 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3000/api/health >/dev/null && break
            sleep 2
          done
          npm run test:ci -- pos-money-path:e2e

      - name: POS browser E2E CI policy summary
        if: always()
        env:
          POS_BROWSER_E2E_STEP_OUTCOME: ${{ steps.pos_browser_e2e.outcome }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
        run: npm run test:ci -- pos-browser-e2e:policy

      - name: Upload POS browser E2E summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pos-browser-e2e-summary
          path: ci-artifacts/pos-browser-e2e-summary.json
          if-no-files-found: warn

  kds-v1-prototype:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kitchenos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kitchenos_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/kitchenos_ci
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/kitchenos_ci
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      RUN_DB_INTEGRATION: "1"
      CI: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply schema to CI database
        run: node ./node_modules/prisma/build/index.js db push --skip-generate

      - name: KDS v1 queue → bump integration
        run: npm run test:ci -- kds-v1:integration

  p0-staging-smokes:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: P0 staging proof policy unit gate (always-on)
        run: npm run test:ci -- p0-staging-proof-unblock-era17

      - name: Assess P0 vault secrets
        id: p0_vault
        env:
          E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          SSO_STAGING_WORKSPACE_ID: ${{ secrets.SSO_STAGING_WORKSPACE_ID }}
          SSO_STAGING_IDP_VENDOR: ${{ secrets.SSO_STAGING_IDP_VENDOR }}
          SSO_STAGING_ALLOWED_DOMAIN: ${{ secrets.SSO_STAGING_ALLOWED_DOMAIN }}
          SSO_STAGING_TEST_EMAIL: ${{ secrets.SSO_STAGING_TEST_EMAIL }}
          SSO_STAGING_SUPABASE_PROVIDER_REF: ${{ secrets.SSO_STAGING_SUPABASE_PROVIDER_REF }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CHANNEL_SMOKE_OWNER_EMAIL: ${{ secrets.CHANNEL_SMOKE_OWNER_EMAIL }}
        run: |
          if npm run ops -- validate-p0-vault-env -- --json > /tmp/p0-vault.json 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: P0 staging smokes (optional — all 11 vault secrets required)
        id: p0_staging_smokes
        if: steps.p0_vault.outputs.ready == 'true'
        env:
          E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          SSO_STAGING_WORKSPACE_ID: ${{ secrets.SSO_STAGING_WORKSPACE_ID }}
          SSO_STAGING_IDP_VENDOR: ${{ secrets.SSO_STAGING_IDP_VENDOR }}
          SSO_STAGING_ALLOWED_DOMAIN: ${{ secrets.SSO_STAGING_ALLOWED_DOMAIN }}
          SSO_STAGING_TEST_EMAIL: ${{ secrets.SSO_STAGING_TEST_EMAIL }}
          SSO_STAGING_SUPABASE_PROVIDER_REF: ${{ secrets.SSO_STAGING_SUPABASE_PROVIDER_REF }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CHANNEL_SMOKE_OWNER_EMAIL: ${{ secrets.CHANNEL_SMOKE_OWNER_EMAIL }}
        run: npm run smoke -- p0-staging-proof-unblock

      - name: P0 staging smokes CI policy summary
        if: always()
        env:
          P0_STAGING_SMOKES_STEP_OUTCOME: ${{ steps.p0_staging_smokes.outcome }}
          E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          SSO_STAGING_WORKSPACE_ID: ${{ secrets.SSO_STAGING_WORKSPACE_ID }}
          SSO_STAGING_IDP_VENDOR: ${{ secrets.SSO_STAGING_IDP_VENDOR }}
          SSO_STAGING_ALLOWED_DOMAIN: ${{ secrets.SSO_STAGING_ALLOWED_DOMAIN }}
          SSO_STAGING_TEST_EMAIL: ${{ secrets.SSO_STAGING_TEST_EMAIL }}
          SSO_STAGING_SUPABASE_PROVIDER_REF: ${{ secrets.SSO_STAGING_SUPABASE_PROVIDER_REF }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CHANNEL_SMOKE_OWNER_EMAIL: ${{ secrets.CHANNEL_SMOKE_OWNER_EMAIL }}
        run: npm run test:ci -- p0-staging-smokes:policy

      - name: Upload P0 staging smokes summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0-staging-smokes-summary
          path: ci-artifacts/p0-staging-smokes-summary.json
          if-no-files-found: warn

  authed-rsc-smoke:
    if: >-
      ${{ secrets.E2E_LOGIN_EMAIL != '' &&
          (secrets.E2E_LOGIN_PASSWORD != '' || secrets.E2E_PASSWORD != '') &&
          secrets.NEXT_PUBLIC_SUPABASE_URL != '' &&
          secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMOKE_BASE_URL: ${{ secrets.RSC_SMOKE_BASE_URL || secrets.E2E_STAGING_BASE_URL || 'https://os-kitchen.com' }}
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD || secrets.E2E_PASSWORD }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authed dashboard RSC probe (46 routes, document + RSC)
        run: npm run smoke -- rsc-authed-dashboard
