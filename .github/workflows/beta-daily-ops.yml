# Week 1+ daily beta health check (requires DATABASE_URL + BETA_COHORT in secrets/vars).

name: Beta Daily Ops

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1-5"

jobs:
  daily-ops:
    if: ${{ secrets.DATABASE_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Daily cohort health
        run: npm run beta:daily-ops
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          BETA_COHORT_EMAILS: ${{ vars.BETA_COHORT_EMAILS }}
          NEXT_PUBLIC_SUPPORT_EMAIL: ${{ vars.NEXT_PUBLIC_SUPPORT_EMAIL }}
          BETA_SLACK_WEBHOOK_URL: ${{ secrets.BETA_SLACK_WEBHOOK_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: beta-daily-ops-${{ github.run_id }}
          path: docs/artifacts/BETA_DAILY_OPS_*.json
