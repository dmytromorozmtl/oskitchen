# Scale readiness integrity — blocks Scale without honest Month 2.

name: Scale Readiness Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/pilot-rollback-drill-summary.json"
      - "artifacts/investor-narrative-onepager-summary.json"
      - "artifacts/scale-readiness-integrity-baseline.json"
      - "lib/commercial/scale-readiness-integrity-era30.ts"
      - "scripts/ops/validate-scale-readiness-integrity.ts"

jobs:
  validate-scale-readiness-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Scale readiness integrity (JSON)
        run: npm run ops -- validate-scale-readiness-integrity -- --json
