# Pilot week 1 execution convergence era25 integrity — blocks week 1 attestation without honest GO convergence.

name: Pilot Week 1 Execution Convergence Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/pilot-week1-execution-convergence-integrity-baseline.json"
      - "artifacts/pilot-week1-execution-convergence-era25-report.md"
      - "lib/commercial/pilot-week1-execution-convergence-integrity-era48.ts"
      - "scripts/ops/validate-pilot-week1-execution-convergence-integrity.ts"

jobs:
  validate-pilot-week1-execution-convergence-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate pilot week 1 execution convergence integrity (JSON)
        run: npm run ops:validate-pilot-week1-execution-convergence-integrity -- --json
