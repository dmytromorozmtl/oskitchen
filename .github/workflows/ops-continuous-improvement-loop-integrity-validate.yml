# Continuous improvement loop integrity — blocks pure operational mode without honest Sustained ops.

name: Continuous Improvement Loop Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/pilot-metrics-baseline-summary.json"
      - "artifacts/competitor-feature-gap-matrix-summary.json"
      - "artifacts/continuous-improvement-loop-integrity-baseline.json"
      - "lib/commercial/continuous-improvement-loop-integrity-era34.ts"
      - "scripts/ops/validate-continuous-improvement-loop-integrity.ts"

jobs:
  validate-continuous-improvement-loop-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Continuous improvement loop integrity (JSON)
        run: npm run ops:validate-continuous-improvement-loop-integrity -- --json
