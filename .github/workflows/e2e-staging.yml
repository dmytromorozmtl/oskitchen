# Staging E2E — runs when repository secrets are configured.
# Required secrets: E2E_STAGING_BASE_URL, E2E_LOGIN_EMAIL, E2E_LOGIN_PASSWORD
# Legacy: E2E_PASSWORD accepted as alias for E2E_LOGIN_PASSWORD (era12-e2e-staging-secrets-align-v1)
# Auth wiring: auth.setup + dashboard-authed smoke (era12-e2e-staging-auth-wiring-v1)
# Optional: E2E_STOREFRONT_SLUG (default hello), DATABASE_URL for DB-backed checks

name: E2E Staging

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  staging-e2e:
    if: ${{ secrets.E2E_STAGING_BASE_URL != '' && secrets.E2E_LOGIN_EMAIL != '' && (secrets.E2E_LOGIN_PASSWORD != '' || secrets.E2E_PASSWORD != '') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "1"
      PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD || secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install chromium --with-deps

      - name: Auth setup
        run: npx playwright test e2e/auth.setup.ts --project=setup

      - name: Platform + unauthenticated smoke
        run: npx playwright test tests/e2e/platform-access-denial.spec.ts e2e/smoke.spec.ts --project=chromium

      - name: Dashboard authenticated smoke
        run: npx playwright test e2e/dashboard-auth.spec.ts --project=chromium-authed

      - name: Storefront smoke
        if: ${{ vars.E2E_STOREFRONT_SLUG != '' }}
        run: npx playwright test e2e/storefront.spec.ts --project=chromium
        env:
          E2E_STOREFRONT_SLUG: ${{ vars.E2E_STOREFRONT_SLUG }}
