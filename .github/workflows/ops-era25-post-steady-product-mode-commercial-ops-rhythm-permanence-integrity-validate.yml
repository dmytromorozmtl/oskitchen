    paths:
      - "artifacts/era25-post-steady-product-mode-commercial-ops-rhythm-permanence-integrity-baseline.json"
      - "lib/commercial/era25-post-steady-product-mode-commercial-ops-rhythm-permanence-integrity-era68.ts"
