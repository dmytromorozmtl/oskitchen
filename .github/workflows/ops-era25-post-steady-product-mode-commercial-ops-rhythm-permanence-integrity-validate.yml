          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 post-steady-product-mode commercial ops rhythm permanence integrity (JSON)
        run: npm run ops -- validate-era25-post-steady-product-mode-commercial-ops-rhythm-permanence-integrity -- --json
