# Maintenance mode validation — workflow_dispatch (Step 12, informational).

name: Maintenance Mode Validate

on:
  workflow_dispatch:

jobs:
  validate-maintenance-mode:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate maintenance mode (JSON summary)
        run: npm run ops:validate-maintenance-mode -- --json
        env:
          SCALE_PER_CUSTOMER_GO_ISOLATION: ${{ secrets.SCALE_PER_CUSTOMER_GO_ISOLATION }}
          SERIES_A_MARKETING_CLAIMS_STRICT_REVIEWED: ${{ secrets.SERIES_A_MARKETING_CLAIMS_STRICT_REVIEWED }}
          MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED: ${{ secrets.MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED }}
          MARKET_LEADER_MOAT_DECK_REVIEWED: ${{ secrets.MARKET_LEADER_MOAT_DECK_REVIEWED }}
          MARKET_LEADER_ANALYST_KIT_PUBLISHED: ${{ secrets.MARKET_LEADER_ANALYST_KIT_PUBLISHED }}
          MARKET_LEADER_EXPANSION_MOTION_REVIEWED: ${{ secrets.MARKET_LEADER_EXPANSION_MOTION_REVIEWED }}
          SUSTAINED_OPS_DAILY_CADENCE_ATTESTED: ${{ secrets.SUSTAINED_OPS_DAILY_CADENCE_ATTESTED }}
          SUSTAINED_OPS_WEEKLY_INTEGRATION_REVIEWED: ${{ secrets.SUSTAINED_OPS_WEEKLY_INTEGRATION_REVIEWED }}
          SUSTAINED_OPS_MONTHLY_METRICS_REFRESHED: ${{ secrets.SUSTAINED_OPS_MONTHLY_METRICS_REFRESHED }}
          SUSTAINED_OPS_QUARTERLY_GOVERNANCE_AUDITED: ${{ secrets.SUSTAINED_OPS_QUARTERLY_GOVERNANCE_AUDITED }}
      - name: Maintenance mode post-product-evolution orchestrator (JSON summary)
        run: npm run ops:run-maintenance-mode-post-product-evolution-orchestrator -- --json
        continue-on-error: true
        env:
          SCALE_PER_CUSTOMER_GO_ISOLATION: ${{ secrets.SCALE_PER_CUSTOMER_GO_ISOLATION }}
          SERIES_A_MARKETING_CLAIMS_STRICT_REVIEWED: ${{ secrets.SERIES_A_MARKETING_CLAIMS_STRICT_REVIEWED }}
          MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED: ${{ secrets.MARKET_LEADER_CATEGORY_NARRATIVE_REVIEWED }}
          MARKET_LEADER_MOAT_DECK_REVIEWED: ${{ secrets.MARKET_LEADER_MOAT_DECK_REVIEWED }}
          MARKET_LEADER_ANALYST_KIT_PUBLISHED: ${{ secrets.MARKET_LEADER_ANALYST_KIT_PUBLISHED }}
          MARKET_LEADER_EXPANSION_MOTION_REVIEWED: ${{ secrets.MARKET_LEADER_EXPANSION_MOTION_REVIEWED }}
          SUSTAINED_OPS_DAILY_CADENCE_ATTESTED: ${{ secrets.SUSTAINED_OPS_DAILY_CADENCE_ATTESTED }}
          SUSTAINED_OPS_WEEKLY_INTEGRATION_REVIEWED: ${{ secrets.SUSTAINED_OPS_WEEKLY_INTEGRATION_REVIEWED }}
          SUSTAINED_OPS_MONTHLY_METRICS_REFRESHED: ${{ secrets.SUSTAINED_OPS_MONTHLY_METRICS_REFRESHED }}
          SUSTAINED_OPS_QUARTERLY_GOVERNANCE_AUDITED: ${{ secrets.SUSTAINED_OPS_QUARTERLY_GOVERNANCE_AUDITED }}
