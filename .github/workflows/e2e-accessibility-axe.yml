# Authenticated dashboard accessibility — axe-core WCAG 2.1 AA on 10 key pages.
# Required secrets: E2E_LOGIN_EMAIL, E2E_LOGIN_PASSWORD
# Optional: E2E_STAGING_BASE_URL or RSC_SMOKE_BASE_URL (default https://os-kitchen.com)

name: E2E accessibility axe

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"
  pull_request:
    paths:
      - "app/dashboard/**"
      - "components/dashboard/**"
      - "e2e/dashboard-accessibility-axe.spec.ts"
      - "lib/accessibility/**"
      - "playwright.config.ts"
      - ".github/workflows/e2e-accessibility-axe.yml"

jobs:
  dashboard-a11y:
    if: >-
      ${{ secrets.E2E_LOGIN_EMAIL != '' && secrets.E2E_LOGIN_PASSWORD != '' }}
    name: axe-core — 10 dashboard pages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL || secrets.RSC_SMOKE_BASE_URL || 'https://os-kitchen.com' }}
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD || secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Dashboard axe-core E2E (10 pages)
        run: npm run test:e2e:dashboard-a11y
