# Scale readiness env validation — workflow_dispatch (Step 6, post Month 2).

name: Scale Readiness Validate

on:
  workflow_dispatch:

jobs:
  validate-scale-readiness-env:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Scale readiness env (JSON summary)
        run: npm run ops -- validate-scale-readiness-env -- --json
        env:
          SCALE_PER_CUSTOMER_GO_ISOLATION: ${{ secrets.SCALE_PER_CUSTOMER_GO_ISOLATION }}
          SCALE_SOC2_READINESS_TRACK_REVIEWED: ${{ secrets.SCALE_SOC2_READINESS_TRACK_REVIEWED }}
          SCALE_SSO_PRODUCTION_STATUS: ${{ secrets.SCALE_SSO_PRODUCTION_STATUS }}
          SCALE_SSO_PRODUCTION_DEFERRED_REASON: ${{ secrets.SCALE_SSO_PRODUCTION_DEFERRED_REASON }}
          SCALE_RESILIENCE_DRILLS_ATTESTED: ${{ secrets.SCALE_RESILIENCE_DRILLS_ATTESTED }}
          SCALE_DATA_ROOM_INDEX_PUBLISHED: ${{ secrets.SCALE_DATA_ROOM_INDEX_PUBLISHED }}
          SCALE_SECOND_PAID_PILOT_QUEUED: ${{ secrets.SCALE_SECOND_PAID_PILOT_QUEUED }}
      - name: Scale readiness post-Month 2 orchestrator (JSON summary)
        run: npm run ops -- run-scale-readiness-post-month2-orchestrator -- --json --skip-template
        continue-on-error: true
        env:
          SCALE_PER_CUSTOMER_GO_ISOLATION: ${{ secrets.SCALE_PER_CUSTOMER_GO_ISOLATION }}
          SCALE_SOC2_READINESS_TRACK_REVIEWED: ${{ secrets.SCALE_SOC2_READINESS_TRACK_REVIEWED }}
          SCALE_SSO_PRODUCTION_STATUS: ${{ secrets.SCALE_SSO_PRODUCTION_STATUS }}
          SCALE_SSO_PRODUCTION_DEFERRED_REASON: ${{ secrets.SCALE_SSO_PRODUCTION_DEFERRED_REASON }}
          SCALE_RESILIENCE_DRILLS_ATTESTED: ${{ secrets.SCALE_RESILIENCE_DRILLS_ATTESTED }}
          SCALE_DATA_ROOM_INDEX_PUBLISHED: ${{ secrets.SCALE_DATA_ROOM_INDEX_PUBLISHED }}
          SCALE_SECOND_PAID_PILOT_QUEUED: ${{ secrets.SCALE_SECOND_PAID_PILOT_QUEUED }}
