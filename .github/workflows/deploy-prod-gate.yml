name: Deploy production gate

# Required check before `npm run deploy:prod` — vitest must pass on main/PR.
# Branch protection: add job "vitest-deploy-gate" as required on main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-prod-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest-deploy-gate:
    name: vitest pass (required before deploy:prod)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (high severity gate)
        run: npm run audit -- dependencies:high

      - name: Prisma generate
        run: npx prisma generate

      - name: Migration health (schema validate + optional DB drift)
        run: npm run check:migration-health

      - name: Prisma index audit (401 models, tenant-scope coverage)
        run: npm run check:prisma-indexes

      - name: Console.log surface audit (Tier A/B + top-50)
        run: npm run audit -- console-log-surface -- --write

      - name: Bundle chunk audit (top-5 code-split wiring)
        run: npm run audit -- bundle-chunks

      - name: Preview route guard audit (≥280 hidden routes)
        run: npm run audit -- preview-routes-hidden

      - name: Login → Today → Playbook E2E audit
        run: npm run audit -- login-today-playbook-e2e

      - name: POS shift → checkout → receipt E2E audit
        run: npm run audit -- pos-shift-checkout-receipt-e2e

      - name: POS checkout full scenario E2E audit
        run: npm run audit -- pos-checkout-e2e

      - name: Loyalty earn/redeem E2E audit
        run: npm run audit -- loyalty-earn-redeem-e2e

      - name: QR scan→storefront→KDS E2E audit
        run: npm run audit -- qr-scan-storefront-kds-e2e

      - name: KDS bump → expo E2E audit
        run: npm run audit -- kds-bump-expo-e2e

      - name: Marketplace cart → PO → fulfill E2E audit
        run: npm run audit -- marketplace-cart-po-fulfill-e2e

      - name: Invoice scan → PO → approve E2E audit
        run: npm run audit -- invoice-scan-po-approve-e2e

      - name: Bank import → reconcile E2E audit
        run: npm run audit -- bank-import-reconcile-e2e

      - name: Storefront publish → order → KDS E2E audit
        run: npm run audit -- storefront-publish-order-kds-e2e

      - name: Webhook ingest → order creation E2E audit
        run: npm run audit -- webhook-ingest-order-creation-e2e

      - name: Offline POS → reconnect → sync E2E audit
        run: npm run audit -- offline-pos-reconnect-sync-e2e

      - name: Offline POS PCI flow E2E audit
        run: npm run audit -- offline-pos-pci-flow-e2e

      - name: Role permissions matrix E2E audit
        run: npm run audit -- role-permissions-matrix-e2e

      - name: KDS Playwright E2E audit
        run: npm run audit -- kds-playwright-e2e

      - name: POS shift open → close E2E audit
        run: npm run audit -- pos-shift-open-close-e2e

      - name: Rate limit E2E audit
        run: npm run audit -- rate-limit-e2e

      - name: Webhook replay idempotency E2E audit
        run: npm run audit -- webhook-replay-idempotency-e2e

      - name: AI invoice accuracy regression audit
        run: npm run audit -- ai-invoice-accuracy-regression

