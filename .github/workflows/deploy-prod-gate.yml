      - name: API mutation rate limit audit
        run: npm run audit -- api-mutation-rate-limit

      - name: Webhook signature regression (59 routes)
        run: npm run check:webhook-signature-regression

      - name: Dashboard error boundary audit
        run: npm run audit -- dashboard-error-boundaries

      - name: Unit tests (deploy gate)
        run: npm test

      - name: Assert deploy script has no DEPLOY_SKIP_VITEST bypass
        run: |
          if grep -q 'DEPLOY_SKIP_VITEST' scripts/deploy-prebuilt-prod.sh; then
            echo "deploy-prebuilt-prod.sh must not reference DEPLOY_SKIP_VITEST"
            exit 1
          fi
          if ! grep -q 'vitest.mjs run' scripts/deploy-prebuilt-prod.sh; then
            echo "deploy-prebuilt-prod.sh must run vitest before deploy"
            exit 1
          fi
