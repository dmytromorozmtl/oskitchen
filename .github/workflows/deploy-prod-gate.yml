name: Deploy production gate

# Required check before `npm run deploy:prod` — vitest must pass on main/PR.
# Branch protection: add job "vitest-deploy-gate" as required on main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-prod-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest-deploy-gate:
    name: vitest pass (required before deploy:prod)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (high severity gate)
        run: npm run audit:dependencies:high

      - name: Prisma generate
        run: npx prisma generate

      - name: Migration health (schema validate + optional DB drift)
        run: npm run check:migration-health

      - name: API mutation rate limit audit
        run: npm run audit:api-mutation-rate-limit

      - name: Unit tests (deploy gate)
        run: npm test

      - name: Assert deploy script has no DEPLOY_SKIP_VITEST bypass
        run: |
          if grep -q 'DEPLOY_SKIP_VITEST' scripts/deploy-prebuilt-prod.sh; then
            echo "deploy-prebuilt-prod.sh must not reference DEPLOY_SKIP_VITEST"
            exit 1
          fi
          if ! grep -q 'vitest.mjs run' scripts/deploy-prebuilt-prod.sh; then
            echo "deploy-prebuilt-prod.sh must run vitest before deploy"
            exit 1
          fi
