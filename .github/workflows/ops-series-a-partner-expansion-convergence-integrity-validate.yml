# Series A partner expansion convergence era25 integrity — blocks Series A attestation without honest scale.

name: Series A Partner Expansion Convergence Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/series-a-partner-expansion-convergence-integrity-baseline.json"
      - "artifacts/series-a-partner-expansion-convergence-era25-report.md"
      - "lib/commercial/series-a-partner-expansion-convergence-integrity-era51.ts"
      - "scripts/ops/validate-series-a-partner-expansion-convergence-integrity.ts"

jobs:
  validate-series-a-partner-expansion-convergence-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Series A partner expansion convergence integrity (JSON)
        run: npm run ops -- validate-series-a-partner-expansion-convergence-integrity -- --json
