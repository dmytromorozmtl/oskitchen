# Pilot Week 1 env validation — workflow_dispatch (Step 4, post-GO).

name: Pilot Week 1 Validate

on:
  workflow_dispatch:

jobs:
  validate-pilot-week1-env:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Pilot Week 1 env (JSON summary)
        run: npm run ops:validate-pilot-week1-env -- --json
        env:
          PILOT_WEEK1_TTV_HOURS: ${{ secrets.PILOT_WEEK1_TTV_HOURS }}
          PILOT_WEEK1_FIRST_ORDER_ID: ${{ secrets.PILOT_WEEK1_FIRST_ORDER_ID }}
          PILOT_WEEK1_INTEGRATION_HEALTH_REVIEWED: ${{ secrets.PILOT_WEEK1_INTEGRATION_HEALTH_REVIEWED }}
          PILOT_WEEK1_POS_CLOSEOUT_STATUS: ${{ secrets.PILOT_WEEK1_POS_CLOSEOUT_STATUS }}
          PILOT_WEEK1_REPORTS_WEEKLY_EXPORT: ${{ secrets.PILOT_WEEK1_REPORTS_WEEKLY_EXPORT }}
