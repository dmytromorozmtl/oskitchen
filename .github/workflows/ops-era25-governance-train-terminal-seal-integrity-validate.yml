# Era25 governance train terminal seal integrity — blocks seal before honest post-market steady ops witness.

name: Era25 Governance Train Terminal Seal Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/era25-governance-train-terminal-seal-integrity-baseline.json"
      - "lib/commercial/era25-governance-train-terminal-seal-integrity-era64.ts"
      - "lib/commercial/era25-governance-train-terminal-seal-phases-era64.ts"
      - "scripts/ops/validate-era25-governance-train-terminal-seal-integrity.ts"

jobs:
  validate-era25-governance-train-terminal-seal-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 governance train terminal seal integrity (JSON)
        run: npm run ops -- validate-era25-governance-train-terminal-seal-integrity -- --json
