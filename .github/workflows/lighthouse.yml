# Marketing Lighthouse CI — performance / a11y / SEO regression on PRs.
# See docs/monitoring.md and lighthouserc.marketing.cjs.

name: Lighthouse CI

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "lighthouserc.marketing.cjs"
      - ".github/workflows/lighthouse.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-marketing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kitchenos_ci
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kitchenos_ci
          CRON_SECRET: ci-lighthouse-cron-secret

      - name: Start server and run Lighthouse CI
        run: |
          npm run start -- -p 3000 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3000/login >/dev/null && break
            sleep 2
          done
          npx @lhci/cli autorun --config=lighthouserc.marketing.cjs
        env:
          LHCI_BASE_URL: http://127.0.0.1:3000
