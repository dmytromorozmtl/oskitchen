# P0 staging proof smokes — dedicated ops workflow (Tier 2c).
# Runs the same bundle as ci.yml → job `p0-staging-smokes`:
#   1. Always-on policy unit gate
#   2. Optional live smokes when all 11 P0 vault secrets are configured
#   3. Policy summary artifact (PASSED / SKIPPED / FAILED)
#
# Required secrets (all 11 for live smokes): E2E_STAGING_BASE_URL, E2E_LOGIN_EMAIL,
# E2E_LOGIN_PASSWORD, SSO_STAGING_*, DATABASE_URL, ENCRYPTION_KEY, CHANNEL_SMOKE_OWNER_EMAIL
# Ops checklist: docs/era18-p0-staging-proof-ops-checklist.md

name: P0 Staging Smokes

on:
  workflow_dispatch:
    inputs:
      policy_only:
        description: "Run policy unit gate + summary only (skip live smokes even when secrets exist)"
        type: boolean
        default: false
  schedule:
    - cron: "0 7 * * *"
  push:
    branches: [main]
    paths:
      - "lib/ci/p0-staging-smokes-ci-policy.ts"
      - "lib/commercial/p0-staging-proof-unblock*.ts"
      - "scripts/smoke-p0-staging-proof-unblock-era17.ts"
      - "scripts/p0-staging-smokes-ci-policy.ts"
      - "scripts/ops/validate-p0-vault-env.ts"
      - ".github/workflows/p0-staging-smokes.yml"
  pull_request:
    paths:
      - "lib/ci/p0-staging-smokes-ci-policy.ts"
      - "scripts/smoke-p0-staging-proof-unblock-era17.ts"
      - "scripts/p0-staging-smokes-ci-policy.ts"
      - ".github/workflows/p0-staging-smokes.yml"

concurrency:
  group: p0-staging-smokes-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  p0-staging-smokes:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: P0 staging proof policy unit gate (always-on)
        run: npm run test:ci:p0-staging-proof-unblock-era17

      - name: Assess P0 vault secrets
        id: p0_vault
        env:
          E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          SSO_STAGING_WORKSPACE_ID: ${{ secrets.SSO_STAGING_WORKSPACE_ID }}
          SSO_STAGING_IDP_VENDOR: ${{ secrets.SSO_STAGING_IDP_VENDOR }}
          SSO_STAGING_ALLOWED_DOMAIN: ${{ secrets.SSO_STAGING_ALLOWED_DOMAIN }}
          SSO_STAGING_TEST_EMAIL: ${{ secrets.SSO_STAGING_TEST_EMAIL }}
          SSO_STAGING_SUPABASE_PROVIDER_REF: ${{ secrets.SSO_STAGING_SUPABASE_PROVIDER_REF }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CHANNEL_SMOKE_OWNER_EMAIL: ${{ secrets.CHANNEL_SMOKE_OWNER_EMAIL }}
        run: |
          if npm run ops:validate-p0-vault-env -- --json > /tmp/p0-vault.json 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: P0 staging smokes (optional — all 11 vault secrets required)
        id: p0_staging_smokes
        if: steps.p0_vault.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.policy_only != true)
        env:
          E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          SSO_STAGING_WORKSPACE_ID: ${{ secrets.SSO_STAGING_WORKSPACE_ID }}
          SSO_STAGING_IDP_VENDOR: ${{ secrets.SSO_STAGING_IDP_VENDOR }}
          SSO_STAGING_ALLOWED_DOMAIN: ${{ secrets.SSO_STAGING_ALLOWED_DOMAIN }}
          SSO_STAGING_TEST_EMAIL: ${{ secrets.SSO_STAGING_TEST_EMAIL }}
          SSO_STAGING_SUPABASE_PROVIDER_REF: ${{ secrets.SSO_STAGING_SUPABASE_PROVIDER_REF }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CHANNEL_SMOKE_OWNER_EMAIL: ${{ secrets.CHANNEL_SMOKE_OWNER_EMAIL }}
        run: npm run smoke:p0-staging-proof-unblock

      - name: P0 staging smokes CI policy summary
        if: always()
        env:
          P0_STAGING_SMOKES_STEP_OUTCOME: ${{ steps.p0_staging_smokes.outcome }}
          E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
          SSO_STAGING_WORKSPACE_ID: ${{ secrets.SSO_STAGING_WORKSPACE_ID }}
          SSO_STAGING_IDP_VENDOR: ${{ secrets.SSO_STAGING_IDP_VENDOR }}
          SSO_STAGING_ALLOWED_DOMAIN: ${{ secrets.SSO_STAGING_ALLOWED_DOMAIN }}
          SSO_STAGING_TEST_EMAIL: ${{ secrets.SSO_STAGING_TEST_EMAIL }}
          SSO_STAGING_SUPABASE_PROVIDER_REF: ${{ secrets.SSO_STAGING_SUPABASE_PROVIDER_REF }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CHANNEL_SMOKE_OWNER_EMAIL: ${{ secrets.CHANNEL_SMOKE_OWNER_EMAIL }}
        run: npm run test:ci:p0-staging-smokes:policy

      - name: Upload P0 staging smokes summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0-staging-smokes-summary-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/p0-staging-smokes-summary.json
          if-no-files-found: warn
