# Mobile-first redesign E2E — POS mobile (375px) + KDS tablet landscape (1024×768).
# Required secrets: E2E_LOGIN_EMAIL, E2E_LOGIN_PASSWORD
# Optional: E2E_STAGING_BASE_URL or RSC_SMOKE_BASE_URL (default https://os-kitchen.com)

name: E2E mobile-first redesign POS + KDS

on:
  workflow_dispatch:
  schedule:
    - cron: "45 7 * * *"
  pull_request:
    paths:
      - "app/dashboard/pos/mobile/**"
      - "app/dashboard/kitchen/**"
      - "components/pos/pos-mobile-client.tsx"
      - "components/kitchen/kds-daily-service.tsx"
      - "lib/design/mobile-first-redesign-absolute-final-policy.ts"
      - "lib/kitchen/kds-tablet-landscape-layout.ts"
      - "e2e/mobile-first-redesign-pos-kds.spec.ts"
      - "playwright.config.ts"
      - ".github/workflows/e2e-mobile-first-redesign-pos-kds.yml"

jobs:
  mobile-first-redesign-pos-kds:
    if: >-
      ${{ secrets.E2E_LOGIN_EMAIL != '' && secrets.E2E_LOGIN_PASSWORD != '' }}
    name: Mobile-first — POS 375px + KDS 1024×768
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL || secrets.RSC_SMOKE_BASE_URL || 'https://os-kitchen.com' }}
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD || secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Mobile-first redesign E2E
        run: npm run test:e2e:mobile-first-redesign-pos-kds
