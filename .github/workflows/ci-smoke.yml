name: CI Smoke (Playwright)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kitchenos_ci
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kitchenos_ci
          CRON_SECRET: ci-smoke-cron-secret-not-used-at-runtime

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server and run public smoke
        run: |
          npm run start -- -p 3000 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3000/login >/dev/null && break
            sleep 2
          done
          npx playwright test e2e/smoke.spec.ts e2e/ci-smoke.spec.ts --project=chromium
        env:
          CI: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
