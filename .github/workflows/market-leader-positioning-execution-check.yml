name: Market Leader Positioning Execution Check

on:
  push:
    branches: [main]
    paths:
      - "lib/ops/market-leader-positioning-execution-*.ts"
      - "scripts/ops/run-market-leader-positioning-execution.ts"
      - "artifacts/market-leader-positioning-execution-summary.json"
  pull_request:
    paths:
      - "lib/ops/market-leader-positioning-execution-*.ts"
      - "scripts/ops/run-market-leader-positioning-execution.ts"
  workflow_dispatch:

jobs:
  market-leader-positioning-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Assess market leader positioning execution (honest blocked state in CI)
        run: npm run ops:run-market-leader-positioning-execution -- --write || true
      - name: Upload execution report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-leader-positioning-execution-report
          path: |
            artifacts/market-leader-positioning-execution-summary.json
            artifacts/market-leader-positioning-execution-report.html
          if-no-files-found: warn
