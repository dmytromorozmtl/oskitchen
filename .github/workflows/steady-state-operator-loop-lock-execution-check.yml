name: Steady State Operator Loop Lock Execution Check

on:
  push:
    branches: [main]
    paths:
      - "lib/ops/steady-state-operator-loop-lock-execution-*.ts"
      - "scripts/ops/run-steady-state-operator-loop-lock-execution.ts"
      - "artifacts/steady-state-operator-loop-lock-execution-summary.json"
  pull_request:
    paths:
      - "lib/ops/steady-state-operator-loop-lock-execution-*.ts"
      - "scripts/ops/run-steady-state-operator-loop-lock-execution.ts"
  workflow_dispatch:

jobs:
  steady-state-operator-loop-lock-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Assess steady-state operator loop lock (honest blocked state in CI)
        run: npm run ops -- run-steady-state-operator-loop-lock-execution -- --write || true
      - name: Upload execution report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: steady-state-operator-loop-lock-execution-report
          path: |
            artifacts/steady-state-operator-loop-lock-execution-summary.json
            artifacts/steady-state-operator-loop-lock-execution-report.html
          if-no-files-found: warn
