name: era25 Market Leader Positioning Convergence Validate

on:
  workflow_dispatch:

jobs:
  validate-market-leader-positioning-convergence-era25:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 market leader positioning convergence (JSON summary)
        run: npm run ops:validate-market-leader-positioning-convergence-era25 -- --json
      - name: era25 market leader post-series-a-convergence orchestrator (JSON summary)
        run: npm run ops:run-market-leader-positioning-convergence-post-series-a-convergence-orchestrator-era25 -- --json
        continue-on-error: true
