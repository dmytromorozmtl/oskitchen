# Scheduled smoke against production — no secrets required for public checks.
name: Production weekly smoke

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-weekly-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: GSC / SEO preflight (production)
        run: npx tsx scripts/gtm-gsc-preflight.ts

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Public health smoke
        env:
          PLAYWRIGHT_BASE_URL: https://os-kitchen.com
          CI: true
        run: npx playwright test tests/e2e/public-health.spec.ts --project=ci-critical-paths
