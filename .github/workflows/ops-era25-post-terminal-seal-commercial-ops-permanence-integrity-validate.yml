# Era25 post-terminal-seal commercial ops permanence integrity — blocks permanence before honest terminal seal.

name: Era25 Post Terminal Seal Commercial Ops Permanence Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/era25-post-terminal-seal-commercial-ops-permanence-integrity-baseline.json"
      - "lib/commercial/era25-post-terminal-seal-commercial-ops-permanence-integrity-era65.ts"
      - "lib/commercial/era25-post-terminal-seal-commercial-ops-permanence-phases-era65.ts"
      - "scripts/ops/validate-era25-post-terminal-seal-commercial-ops-permanence-integrity.ts"

jobs:
  validate-era25-post-terminal-seal-commercial-ops-permanence-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 post-terminal-seal commercial ops permanence integrity (JSON)
        run: npm run ops:validate-era25-post-terminal-seal-commercial-ops-permanence-integrity -- --json
