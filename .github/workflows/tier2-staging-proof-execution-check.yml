name: Tier 2 Staging Proof Execution Check

on:
  push:
    branches: [main]
    paths:
      - "lib/ops/tier2-staging-proof-execution-*.ts"
      - "scripts/ops/run-tier2-staging-proof-execution.ts"
      - "artifacts/tier2-staging-proof-execution-summary.json"
  pull_request:
    paths:
      - "lib/ops/tier2-staging-proof-execution-*.ts"
      - "scripts/ops/run-tier2-staging-proof-execution.ts"
  workflow_dispatch:

jobs:
  tier2-staging-proof-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Assess Tier 2 staging proof execution (honest blocked state in CI)
        run: npm run ops -- run-tier2-staging-proof-execution -- --write || true
      - name: Upload execution report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tier2-staging-proof-execution-report
          path: |
            artifacts/tier2-staging-proof-execution-summary.json
            artifacts/tier2-staging-proof-execution-report.html
          if-no-files-found: warn
