# Era25 first product slice blueprint integrity — blocks blueprint attestation without honest engineering gates.

name: Era25 First Product Slice Blueprint Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/era25-first-product-slice-blueprint-integrity-baseline.json"
      - "artifacts/era25-first-product-slice-blueprint-report.md"
      - "lib/commercial/era25-first-product-slice-blueprint-integrity-era45.ts"
      - "scripts/ops/validate-era25-first-product-slice-blueprint-integrity.ts"

jobs:
  validate-era25-first-product-slice-blueprint-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 first product slice blueprint integrity (JSON)
        run: npm run ops:validate-era25-first-product-slice-blueprint-integrity -- --json
