# Authenticated dashboard RSC smoke — 46 pilot-critical routes (document + RSC flight).
# Required secrets: E2E_LOGIN_EMAIL, E2E_LOGIN_PASSWORD, NEXT_PUBLIC_SUPABASE_URL,
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# Optional: RSC_SMOKE_BASE_URL or E2E_STAGING_BASE_URL (default https://os-kitchen.com)

name: Authed RSC smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"
  pull_request:

jobs:
  rsc-smoke:
    if: >-
      ${{ secrets.E2E_LOGIN_EMAIL != '' && secrets.E2E_LOGIN_PASSWORD != '' &&
          secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' }}
    name: authed RSC smoke — 46 dashboard routes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMOKE_BASE_URL: ${{ secrets.RSC_SMOKE_BASE_URL || secrets.E2E_STAGING_BASE_URL || 'https://os-kitchen.com' }}
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD || secrets.E2E_PASSWORD }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authed dashboard RSC probe (46 routes)
        run: npm run smoke -- rsc-authed-dashboard
