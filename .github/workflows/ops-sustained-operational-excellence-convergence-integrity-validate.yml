# Sustained operational excellence convergence era25 integrity — blocks sustained ops attestation without honest market leader.

name: Sustained Operational Excellence Convergence Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/sustained-operational-excellence-convergence-integrity-baseline.json"
      - "artifacts/sustained-operational-excellence-convergence-era25-report.md"
      - "lib/commercial/sustained-operational-excellence-convergence-integrity-era53.ts"
      - "scripts/ops/validate-sustained-operational-excellence-convergence-integrity.ts"

jobs:
  validate-sustained-operational-excellence-convergence-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate sustained operational excellence convergence integrity (JSON)
        run: npm run ops:validate-sustained-operational-excellence-convergence-integrity -- --json
