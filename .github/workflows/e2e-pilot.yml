# Paid pilot journey — staging only. Skipped when secrets are not configured.
# See docs/E2E_PILOT_JOURNEY.md

name: E2E Pilot Journey

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"

jobs:
  pilot-journey:
    if: >-
      ${{ secrets.E2E_STAGING_BASE_URL != '' &&
          secrets.E2E_PILOT_EMAIL != '' &&
          secrets.E2E_PILOT_PASSWORD != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Pilot journey (owner + optional staff)
        run: npm run test:e2e:pilot
        env:
          CI: "1"
          PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_PILOT_EMAIL: ${{ secrets.E2E_PILOT_EMAIL }}
          E2E_PILOT_PASSWORD: ${{ secrets.E2E_PILOT_PASSWORD }}
          E2E_PILOT_STAFF_EMAIL: ${{ secrets.E2E_PILOT_STAFF_EMAIL }}
          E2E_PILOT_STAFF_PASSWORD: ${{ secrets.E2E_PILOT_STAFF_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pilot-report
          path: |
            playwright-report/
            test-results/
