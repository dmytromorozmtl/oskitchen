# DEV-01: P0 orchestrator — tier-0/1/2 staging smokes with honest PASS/FAIL/SKIPPED artifacts.
# Seeds vault secrets from GHA, runs smokes sequentially when all 11 keys present,
# regenerates artifacts/vault-readiness-report.json, fails when vault ready and a smoke fails.
#
# Ops: docs/era18-p0-staging-proof-ops-checklist.md · docs/ops-vault-matrix.md

name: P0 Orchestrator

on:
  workflow_dispatch:
    inputs:
      policy_only:
        description: "Policy unit gate + vault report only (skip live smokes)"
        type: boolean
        default: false
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: p0-orchestrator-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: "1"
  E2E_STAGING_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
  E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
  E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
  SSO_STAGING_WORKSPACE_ID: ${{ secrets.SSO_STAGING_WORKSPACE_ID }}
  SSO_STAGING_IDP_VENDOR: ${{ secrets.SSO_STAGING_IDP_VENDOR }}
  SSO_STAGING_ALLOWED_DOMAIN: ${{ secrets.SSO_STAGING_ALLOWED_DOMAIN }}
  SSO_STAGING_TEST_EMAIL: ${{ secrets.SSO_STAGING_TEST_EMAIL }}
  SSO_STAGING_SUPABASE_PROVIDER_REF: ${{ secrets.SSO_STAGING_SUPABASE_PROVIDER_REF }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
  CHANNEL_SMOKE_OWNER_EMAIL: ${{ secrets.CHANNEL_SMOKE_OWNER_EMAIL }}

jobs:
  p0-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: P0 policy unit gate (tier-0 — always-on)
        run: npm run test:ci:p0-staging-proof-unblock-era17

      - name: Tier 1 — BETA integrations LIVE DoD smoke (always-on)
        id: smoke_beta_dod
        run: npm run smoke:live-integration-dod

      - name: Tier 1 — BETA governance smoke chain (always-on)
        id: smoke_beta_governance_chain
        run: npm run smoke:beta-governance-chain

      - name: Assess P0 vault (11 secrets)
        id: vault
        run: |
          if npm run ops:validate-p0-vault-env -- --json > /tmp/p0-vault.json 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            cat /tmp/p0-vault.json
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Vault incomplete — live smokes will be SKIPPED (honest)."
          fi

      - name: Tier 2.1b — staging workflows first green
        id: smoke_workflows
        if: steps.vault.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.policy_only != true)
        continue-on-error: true
        run: npm run smoke:staging-workflows-first-green

      - name: Tier 2.2 — Woo/Shopify live channel smoke
        id: smoke_channel
        if: steps.vault.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.policy_only != true)
        continue-on-error: true
        run: npm run smoke:woo-shopify-live

      - name: Tier 2.3 — SSO IdP staging login
        id: smoke_sso
        if: steps.vault.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.policy_only != true)
        continue-on-error: true
        run: npm run smoke:enterprise-sso-idp-staging

      - name: Tier 2.4 — P0 aggregate smoke
        id: smoke_p0
        if: steps.vault.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.policy_only != true)
        continue-on-error: true
        run: npm run smoke:p0-staging-proof-unblock

      - name: Tier 2.5 — P0 integrity validation
        id: smoke_integrity
        if: steps.vault.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.policy_only != true)
        continue-on-error: true
        run: npm run ops:validate-p0-staging-proof-integrity

      - name: Regenerate vault-readiness report
        if: always()
        run: npm run check-vault-readiness -- --write || true

      - name: Write P0 execution summary
        if: always()
        run: npm run ops:run-p0-staging-proof-execution -- --write || true

      - name: Upload P0 orchestrator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0-orchestrator-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/vault-readiness-report.json
            artifacts/p0-staging-proof-execution-summary.json
            artifacts/p0-staging-proof-unblock-summary.json
            artifacts/staging-workflows-first-green-summary.json
            artifacts/channel-live-smoke-summary.json
            artifacts/enterprise-sso-idp-staging-smoke-summary.json
            artifacts/smoke-live-integration-dod-summary.json
          if-no-files-found: warn

      - name: Fail when BETA DoD smoke failed
        if: steps.smoke_beta_dod.outcome == 'failure'
        run: exit 1

      - name: Fail when vault ready and any live smoke failed
        if: steps.vault.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.policy_only != true)
        run: |
          set -euo pipefail
          failed=0
          if [ "${{ steps.smoke_workflows.outcome }}" = "failure" ]; then echo "FAIL: smoke_workflows"; failed=1; fi
          if [ "${{ steps.smoke_channel.outcome }}" = "failure" ]; then echo "FAIL: smoke_channel"; failed=1; fi
          if [ "${{ steps.smoke_sso.outcome }}" = "failure" ]; then echo "FAIL: smoke_sso"; failed=1; fi
          if [ "${{ steps.smoke_p0.outcome }}" = "failure" ]; then echo "FAIL: smoke_p0"; failed=1; fi
          if [ "${{ steps.smoke_integrity.outcome }}" = "failure" ]; then echo "FAIL: smoke_integrity"; failed=1; fi
          if [ -f artifacts/vault-readiness-report.json ]; then
            python3 <<'PY'
          import json, sys
          report = json.load(open("artifacts/vault-readiness-report.json"))
          overall = report.get("p0ArtifactOverall") or "SKIPPED"
          print(f"p0ArtifactOverall={overall}")
          if overall == "FAIL":
              sys.exit(1)
          PY
          fi
          exit $failed
