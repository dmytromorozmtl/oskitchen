# Linear path permanently closed — workflow_dispatch (Step 16 terminal).

name: Linear Path Permanently Closed Validate

on:
  workflow_dispatch:

jobs:
  validate-linear-path-permanently-closed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate linear path permanently closed (JSON summary)
        run: npm run ops -- validate-linear-path-permanently-closed -- --json
      - name: Linear path permanently closed post-absolute-end orchestrator (JSON summary)
        run: npm run ops -- run-linear-path-permanently-closed-post-absolute-end-orchestrator -- --json
        continue-on-error: true
      - name: Validate linear chain terminus guard (Step 17 FORBIDDEN)
        run: npm run ops -- validate-linear-chain-terminus-guard -- --json
