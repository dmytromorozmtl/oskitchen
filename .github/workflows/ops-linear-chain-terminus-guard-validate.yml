# Linear Chain Terminus Guard Validate

name: Linear Chain Terminus Guard Validate

on:
  workflow_dispatch:

jobs:
  validate-linear-chain-terminus-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate linear chain terminus guard (JSON summary)
        run: npm run ops:validate-linear-chain-terminus-guard -- --json
      - name: Linear chain terminus guard post-linear-path-closed orchestrator (JSON summary)
        run: npm run ops:run-linear-chain-terminus-guard-post-linear-path-closed-orchestrator -- --json
        continue-on-error: true
