# Requires GitHub repository variables: STAGING_BASE_URL, STAGING_STORE_SLUG
name: k6 edge assign smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  k6-smoke:
    runs-on: ubuntu-latest
    if: vars.STAGING_BASE_URL != ''
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run edge assign wormhole SLO smoke
        env:
          BASE_URL: ${{ vars.STAGING_BASE_URL }}
          STORE_SLUG: ${{ vars.STAGING_STORE_SLUG }}
          WORMHOLE_SLO_MS: "500"
          K6_VUS: "5"
          K6_DURATION: "15s"
        run: k6 run scripts/load/edge-assign-wormhole.k6.js
