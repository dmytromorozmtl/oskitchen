# Era25 post-market-proof steady operational witness integrity — blocks witness before honest P0 closure capstone.

name: Era25 Post Market Proof Steady Operational Witness Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/era25-post-market-proof-steady-operational-witness-integrity-baseline.json"
      - "lib/commercial/era25-post-market-proof-steady-operational-witness-integrity-era63.ts"
      - "lib/commercial/era25-post-market-proof-steady-operational-witness-phases-era63.ts"
      - "scripts/ops/validate-era25-post-market-proof-steady-operational-witness-integrity.ts"

jobs:
  validate-era25-post-market-proof-steady-operational-witness-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 post-market steady ops witness integrity (JSON)
        run: npm run ops:validate-era25-post-market-proof-steady-operational-witness-integrity -- --json
