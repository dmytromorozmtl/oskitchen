# Paid pilot release gate — build + security + optional staging smoke/E2E.
# Secrets: E2E_STAGING_BASE_URL, E2E_PILOT_EMAIL, E2E_PILOT_PASSWORD, CRON_SECRET, DATABASE_URL

name: Paid Pilot Gate

on:
  workflow_dispatch:
    inputs:
      run_build:
        description: "Run production build"
        type: boolean
        default: true
      run_e2e_pilot:
        description: "Run E2E pilot journey (needs secrets)"
        type: boolean
        default: true

jobs:
  code-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run validate:tenant-scope-pilot
      - run: npm run validate:dashboard-owner-scope
      - run: SKIP_BUILD=1 npm run verify:pilot-readiness
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      - name: Production build
        if: inputs.run_build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  staging-http-smoke:
    if: ${{ secrets.E2E_STAGING_BASE_URL != '' && secrets.CRON_SECRET != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: code-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Golden path HTTP smoke
        run: npm run smoke:golden-path-http
        env:
          SMOKE_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  e2e-pilot:
    if: >-
      ${{ inputs.run_e2e_pilot &&
          secrets.E2E_STAGING_BASE_URL != '' &&
          secrets.E2E_PILOT_EMAIL != '' &&
          secrets.E2E_PILOT_PASSWORD != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: code-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e:pilot
        env:
          CI: "1"
          PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_PILOT_EMAIL: ${{ secrets.E2E_PILOT_EMAIL }}
          E2E_PILOT_PASSWORD: ${{ secrets.E2E_PILOT_PASSWORD }}
          E2E_PILOT_STAFF_EMAIL: ${{ secrets.E2E_PILOT_STAFF_EMAIL }}
          E2E_PILOT_STAFF_PASSWORD: ${{ secrets.E2E_PILOT_STAFF_PASSWORD }}
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paid-pilot-playwright
          path: |
            playwright-report/
            test-results/
