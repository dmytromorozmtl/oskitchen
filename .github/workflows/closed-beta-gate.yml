# Closed-beta security + optional staging smoke (workflow_dispatch).
# Secrets (optional staging): E2E_STAGING_BASE_URL, E2E_LOGIN_EMAIL, E2E_LOGIN_PASSWORD (legacy E2E_PASSWORD alias), DATABASE_URL

name: Closed Beta Gate

on:
  workflow_dispatch:
    inputs:
      run_db_integration:
        description: "Run tenant isolation against DATABASE_URL"
        type: boolean
        default: true

jobs:
  security-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx prisma generate
      - run: npm run validate -- tenant-scope-pilot
      - run: npm run verify-claims
      - name: Paid pilot code readiness (no build)
        run: SKIP_BUILD=1 npm run verify -- pilot-readiness
      - name: Security test bundle
        run: npm run test:security
        env:
          RUN_DB_INTEGRATION: ${{ inputs.run_db_integration && secrets.DATABASE_URL != '' && '1' || '0' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  staging-smoke:
    if: ${{ secrets.E2E_STAGING_BASE_URL != '' && secrets.E2E_LOGIN_EMAIL != '' && (secrets.E2E_LOGIN_PASSWORD != '' || secrets.E2E_PASSWORD != '') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: security-bundle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Auth setup
        run: npx playwright test e2e/auth.setup.ts --project=setup
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
          E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD || secrets.E2E_PASSWORD }}

      - name: Delivery IDOR + export streaming
        run: npx playwright test tests/e2e/remediation-delivery-idor.spec.ts tests/e2e/beta-export-streaming.spec.ts --project=chromium-authed
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          SMOKE_DELIVERY_CONNECTION_ID_OTHER: ${{ vars.SMOKE_DELIVERY_CONNECTION_ID_OTHER }}

      - name: HTTP smoke remediation
        run: npm run smoke -- remediation
        env:
          SMOKE_BASE_URL: ${{ secrets.E2E_STAGING_BASE_URL }}
          SMOKE_PUBLIC_API_KEY: ${{ secrets.SMOKE_PUBLIC_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
