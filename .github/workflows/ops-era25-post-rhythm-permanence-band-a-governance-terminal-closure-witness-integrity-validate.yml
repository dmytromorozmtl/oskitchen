# Era25 post-rhythm-permanence Band A governance terminal closure witness integrity — blocks witness before honest rhythm permanence.

name: Era25 Post Rhythm Permanence Band A Governance Terminal Closure Witness Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/era25-post-rhythm-permanence-band-a-governance-terminal-closure-witness-integrity-baseline.json"
      - "lib/commercial/era25-post-rhythm-permanence-band-a-governance-terminal-closure-witness-integrity-era69.ts"
      - "lib/commercial/era25-post-rhythm-permanence-band-a-governance-terminal-closure-witness-phases-era69.ts"
      - "scripts/ops/validate-era25-post-rhythm-permanence-band-a-governance-terminal-closure-witness-integrity.ts"

jobs:
  validate-era25-post-rhythm-permanence-band-a-governance-terminal-closure-witness-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 post-rhythm-permanence Band A governance terminal closure witness integrity (JSON)
        run: npm run ops -- validate-era25-post-rhythm-permanence-band-a-governance-terminal-closure-witness-integrity -- --json
