# era25 Charter Exit Outside Linear Path Validate

name: era25 Charter Exit Outside Linear Path Validate

on:
  workflow_dispatch:

jobs:
  validate-era25-charter-exit-outside-linear-path:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 charter exit outside linear path (JSON summary)
        run: npm run ops:validate-era25-charter-exit-outside-linear-path -- --json
      - name: era25 charter exit post-terminus-guard orchestrator (JSON summary)
        run: npm run ops:run-era25-charter-exit-post-terminus-guard-orchestrator -- --json
        continue-on-error: true
