# Era25 commercial pilot convergence train capstone integrity — blocks capstone before honest steady-state lock.

name: Era25 Commercial Pilot Convergence Train Capstone Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/era25-commercial-pilot-convergence-train-capstone-integrity-baseline.json"
      - "lib/commercial/era25-commercial-pilot-convergence-train-capstone-integrity-era59.ts"
      - "lib/commercial/era25-commercial-pilot-convergence-train-capstone-phases-era59.ts"
      - "scripts/ops/validate-era25-commercial-pilot-convergence-train-capstone-integrity.ts"

jobs:
  validate-era25-commercial-pilot-convergence-train-capstone-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate era25 train capstone integrity (JSON)
        run: npm run ops -- validate-era25-commercial-pilot-convergence-train-capstone-integrity -- --json
