# Pilot Week 1 execution integrity — blocks Week 1 without honest GO.

name: Pilot Week 1 Execution Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/pilot-gono-go-summary.json"
      - "artifacts/pilot-metrics-baseline-summary.json"
      - "artifacts/pilot-week1-execution-integrity-baseline.json"
      - "lib/commercial/pilot-week1-execution-integrity-era28.ts"
      - "scripts/ops/validate-pilot-week1-execution-integrity.ts"

jobs:
  validate-pilot-week1-execution-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate Pilot Week 1 execution integrity (JSON)
        run: npm run ops -- validate-pilot-week1-execution-integrity -- --json
