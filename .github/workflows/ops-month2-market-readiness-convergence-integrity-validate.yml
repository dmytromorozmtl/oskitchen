# Month 2 market readiness convergence era25 integrity — blocks month2 attestation without honest week 1.

name: Month 2 Market Readiness Convergence Integrity Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/month2-market-readiness-convergence-integrity-baseline.json"
      - "artifacts/month2-market-readiness-convergence-era25-report.md"
      - "lib/commercial/month2-market-readiness-convergence-integrity-era49.ts"
      - "scripts/ops/validate-month2-market-readiness-convergence-integrity.ts"

jobs:
  validate-month2-market-readiness-convergence-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Validate month 2 market readiness convergence integrity (JSON)
        run: npm run ops -- validate-month2-market-readiness-convergence-integrity -- --json
